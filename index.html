<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 16 Desktop</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"iOS桌面模拟","short_name":"iOS","start_url":".","display":"standalone","background_color":"#fce3ec","theme_color":"#ffffff","icons":[{"src":"https://files.catbox.moe/4w52na.jpeg","sizes":"192x192","type":"image/jpeg"},{"src":"https://files.catbox.moe/4w52na.jpeg","sizes":"512x512","type":"image/jpeg"}]}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* 引入自定义最粗字体 */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('https://img.heliar.top/file/1773205572550_最粗的.otf');
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        body, button, input {
            font-family: 'MyCustomFont', -apple-system, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce3ec 0%, #fbe8ec 100%);
            background-image: radial-gradient(#ffd1df 2px, transparent 2px);
            background-size: 30px 30px; 
            overflow: hidden;
        }

        .phone-screen {
            width: 375px;
            height: 812px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            border: 8px solid #fff;
            padding: 30px 15px 20px 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 时间组件 */
        .time-widget {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .time-widget .time {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 8px;
            letter-spacing: -2px;
            filter: drop-shadow(0.3px 0.3px 0.1px rgba(0, 0, 0, 0.45)) drop-shadow(0px 1.5px 1.5px rgba(0, 0, 0, 0.35)); 
        }

        .time-widget .date {
            font-size: 20px;
            font-weight: 600;
            filter: drop-shadow(0px 1.2px 1.5px rgba(0, 0, 0, 0.4));
        }

        /* App 样式 */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .app-icon {
            width: 62px; 
            height: 62px; 
            background: #fff;
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }

        .app-icon img { width: 100%; height: 100%; object-fit: cover; }

        .app-name {
            font-size: 13px;
            color: #ffffff;
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
            filter: drop-shadow(0.2px 0.2px 0.1px rgba(0, 0, 0, 0.4)) drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px 12px;
            width: 100%;
            padding: 0 5px;
        }

        /* 音乐组件 - 缩窄上移版 */
        .music-widget-medium {
            width: 100%;
            height: 150px;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 60px;
        }

        .left-cover { width: 130px; height: 100%; cursor: pointer; }
        .left-cover img { width: 100%; height: 100%; object-fit: cover; }
        .right-content { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        .music-title { font-size: 15px; font-weight: 700; color: #222; margin-bottom: 12px; }
        .progress-bar { width: 100%; height: 4px; background: rgba(0,0,0,0.08); border-radius: 2px; margin-bottom: 15px; }
        .progress-fill { width: 35%; height: 100%; background: #000; border-radius: 2px; }
        .controls-row { display: flex; justify-content: space-between; align-items: center; color: #000; font-size: 18px; }

        /* 底部 Dock 栏 - 上移聚拢版 */
        .bottom-dock {
            position: absolute;
            bottom: 50px;
            width: 92%;
            height: 110px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        /* iOS 风格菜单 */
        .ios-menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }
        .ios-menu { width: 92%; margin-bottom: 25px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .menu-group { background: rgba(255, 255, 255, 0.95); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
        .menu-item { padding: 16px; text-align: center; color: #007AFF; font-size: 18px; border-bottom: 0.5px solid #e0e0e0; cursor: pointer; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="time-widget">
            <div class="time" id="clock">12:00</div>
            <div class="date" id="date">1月1日 星期一</div>
        </div>

        <div class="apps-grid">
            <div class="app-item"><div class="app-icon"><img src="https://files.catbox.moe/4kl6ov.jpeg"></div><div class="app-name">wechat</div></div>
            <div class="app-item"><div class="app-icon"><img src="https://files.catbox.moe/57xwwx.jpeg"></div><div class="app-name">世界书</div></div>
            <div class="app-item"><div class="app-icon"><img src="https://files.catbox.moe/4w52na.jpeg"></div><div class="app-name">设置</div></div>
            <div class="app-item"><div class="app-icon"><img src="https://files.catbox.moe/81ukdn.jpeg"></div><div class="app-name">论坛</div></div>
            <div class="app-item"><div class="app-icon"><img src="https://files.catbox.moe/0lswsw.jpeg"></div><div class="app-name">外观</div></div>
        </div>

        <div class="music-widget-medium">
            <div class="left-cover" onclick="openMenu()">
                <img id="musicCover" src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=300&q=80">
            </div>
            <div class="right-content">
                <div class="music-title" id="musicName" onclick="renameMusic()">Into the New World</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div class="controls-row">
                    <span>⏮</span> <span style="font-size: 24px;">▶</span> <span>⏭</span> <span>⇄</span>
                </div>
            </div>
        </div>

        <div class="bottom-dock">
            <div class="app-item">
                <div class="app-icon"><img src="https://files.catbox.moe/hdoybf.jpeg"></div>
                <div class="app-name">日历</div>
            </div>
            <div class="app-item">
                <div class="app-icon"><img src="https://files.catbox.moe/t1spvi.jpeg"></div>
                <div class="app-name">音乐</div>
            </div>
            <div class="app-item">
                <div class="app-icon"><img src="https://files.catbox.moe/2lqrzq.jpeg"></div>
                <div class="app-name">拼滴滴</div>
            </div>
        </div>

        <div class="ios-menu-overlay" id="menuOverlay" onclick="closeMenu()">
            <div class="ios-menu" onclick="event.stopPropagation()">
                <div class="menu-group">
                    <div class="menu-item" onclick="changeImageByUrl()">图片 URL</div>
                    <div class="menu-item" onclick="document.getElementById('fileInput').click()">系统相册</div>
                </div>
                <div class="menu-group"><div class="menu-item" style="color:#ff3b30; font-weight:700;" onclick="closeMenu()">取消</div></div>
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
    </div>

    <script>
        // 1. 时间逻辑
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('date').textContent = `${now.getMonth() + 1}月${now.getDate()}日 ${weekDays[now.getDay()]}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. 增强版 Service Worker 注册逻辑 (全屏安装必备)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'ios-v1';
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .then(() => console.log('PWA 插件已启动'))
                    .catch(err => console.error('PWA 插件启动失败:', err));
            });
        }

        // 3. 音乐交互逻辑
        const overlay = document.getElementById('menuOverlay');
        const coverImg = document.getElementById('musicCover');
        function openMenu() { overlay.style.display = 'flex'; }
        function closeMenu() { overlay.style.display = 'none'; }
        function changeImageByUrl() {
            const url = prompt("请输入图片 URL：");
            if (url) { coverImg.src = url; closeMenu(); }
        }
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { coverImg.src = e.target.result; closeMenu(); };
                reader.readAsDataURL(file);
            }
        }
        function renameMusic() {
            const oldName = document.getElementById('musicName').innerText;
            const newName = prompt("请输入新的音乐名字：", oldName);
            if (newName) document.getElementById('musicName').innerText = newName;
        }
    </script>
</body>
</html>
